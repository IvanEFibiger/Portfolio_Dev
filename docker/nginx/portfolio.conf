# Portfolio Ivan Fibiger - NGINX reverse proxy de borde
#
# Modelo documentado: NGINX corre en el host VPS y proxya a los puertos
# publicados por Docker Compose:
#   web SSR -> http://localhost:4650
#   API     -> http://localhost:4651 (solo /health directo)
#
# Reemplazar "tu-dominio.com" por el dominio real antes de habilitar.

server {
    listen 80;
    listen [::]:80;
    server_name tu-dominio.com www.tu-dominio.com;

    # Let's Encrypt usa este endpoint durante la emision/renovacion HTTP-01.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name tu-dominio.com www.tu-dominio.com;

    # Certificados Let's Encrypt. Certbot los crea en estas rutas.
    # Reemplazar "tu-dominio.com" por el dominio real si corresponde.
    ssl_certificate /etc/letsencrypt/live/tu-dominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tu-dominio.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Health público directo contra la API para verificación operativa.
    location = /health {
        proxy_pass http://localhost:4651/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Todo el sitio público entra al SSR Angular. El SSR ya proxya /api al backend.
    location / {
        proxy_pass http://localhost:4650;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
